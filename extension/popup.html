<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storypark Photo Sync</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #9a9aaf;
      --success: #4ade80;
      --warning: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface);
      margin-bottom: 12px;
      font-size: 13px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: var(--success); }
    .dot.yellow { background: var(--warning); }
    .dot.red    { background: var(--accent); }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) { opacity: 0.85; }

    #btnConnect {
      background: var(--primary);
      color: var(--text);
      margin-bottom: 8px;
    }
    #btnSync {
      background: var(--accent);
      color: #fff;
      margin-bottom: 12px;
    }

    .log-container {
      background: var(--surface);
      border-radius: 8px;
      padding: 10px;
      max-height: 180px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.5;
      color: var(--muted);
    }
    .log-container p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>📸 Storypark Photo Sync</h1>
  <p class="subtitle">Automatically sync daycare photos to Google Photos</p>

  <!-- Connection status -->
  <div class="status" id="statusBar">
    <span class="dot yellow" id="statusDot"></span>
    <span id="statusText">Checking…</span>
  </div>

  <!-- Buttons -->
  <button id="btnConnect">Connect to Google</button>
  <button id="btnSync" disabled>🔄 Sync Now</button>

  <!-- Progress log -->
  <div class="log-container" id="logBox">
    <p>Waiting for action…</p>
  </div>

  <div class="footer">
    <a href="#" id="openOptions">⚙ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
